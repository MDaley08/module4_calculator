name: Run Tests on Push or Pull request to Main

on:
  push:
    branches: 
      - main # run tests on any push to main
  pull_request:
    branches:
      - main # run tests on any pull to main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6 #checkout code
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-verstion: '3.x'
      
      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov #Ensure pytest-cov is installed
      - name: run tests with pytest and enforce 100% coverage
        run:
          pytest --cov=app --cov-fail-under=99